<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="0.5" stop-color="#eef4fb"/>
      <stop offset="1" stop-color="#e6edf7"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f4ab8"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#243144"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#172033" flood-opacity="0.16"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#172033" flood-opacity="0.10"/>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d7e0ec" stroke-width="1"/>
    </pattern>
    <style>
      .font { font-family: Inter, Segoe UI, Arial, sans-serif; }
      .muted { fill: #64748b; }
      .ink { fill: #111827; }
      .white { fill: #ffffff; }
      .blue { fill: #1d4ed8; }
      .label { font-size: 26px; font-weight: 800; letter-spacing: 0; }
      .small { font-size: 24px; font-weight: 650; letter-spacing: 0; }
      .feature-title { font-size: 25px; font-weight: 850; letter-spacing: 0; }
      .feature-copy { font-size: 19px; font-weight: 550; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#grid)" opacity="0.58"/>

  <circle cx="945" cy="135" r="210" fill="#dbeafe" opacity="0.72"/>
  <circle cx="115" cy="1195" r="240" fill="#e0f2fe" opacity="0.70"/>

  <g class="font" transform="translate(70 68)">
    <rect x="0" y="0" width="940" height="120" rx="26" fill="#ffffff" opacity="0.94" filter="url(#softShadow)"/>
    <g transform="translate(34 26)">
      <rect width="68" height="68" rx="18" fill="url(#primary)"/>
      <path d="M17 45c12-23 30-23 42-4" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
      <path d="M22 26h27c9 0 14 5 14 13v14" fill="none" stroke="#bfdbfe" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="49" cy="37" r="4.5" fill="#ffffff"/>
    </g>
    <text x="132" y="56" class="ink" font-size="34" font-weight="920">DersFlow</text>
    <text x="132" y="91" class="muted" font-size="20" font-weight="600">Canlı ders ve akıllı tahta platformu</text>
    <rect x="708" y="30" width="196" height="60" rx="18" fill="#eef6ff" stroke="#bfdbfe"/>
    <text x="806" y="69" text-anchor="middle" class="blue" font-size="24" font-weight="850">Bulut tabanlı</text>
  </g>

  <g class="font" transform="translate(70 230)">
    <text x="0" y="0" class="ink" font-size="70" font-weight="900">DersFlow ile</text>
    <text x="0" y="78" class="ink" font-size="70" font-weight="900">tek panelden yönet.</text>
    <text x="0" y="135" class="muted" font-size="27" font-weight="600">Ekran paylaşımı, akıllı beyaz tahta, PDF materyal, ders kaydı</text>
    <text x="0" y="171" class="muted" font-size="27" font-weight="600">ve öğrenci etkileşimi tek bir profesyonel sınıfta.</text>
  </g>

  <g transform="translate(70 455)" filter="url(#shadow)">
    <rect x="0" y="0" width="940" height="245" rx="34" fill="url(#dark)"/>
    <g class="font">
      <text x="54" y="70" class="white" font-size="28" font-weight="800">Aylık abonelik</text>
      <text x="54" y="157" class="white" font-size="94" font-weight="950">250 TL</text>
      <text x="430" y="96" fill="#cbd5e1" font-size="28" font-weight="700">Online ders veren eğitmenler için</text>
      <text x="430" y="137" fill="#cbd5e1" font-size="28" font-weight="700">hızlı kurulum, sade kullanım, güçlü araçlar.</text>
      <rect x="430" y="169" width="382" height="44" rx="14" fill="#2563eb"/>
      <text x="621" y="199" text-anchor="middle" class="white" font-size="22" font-weight="850">DersFlow ile hemen başla</text>
    </g>
  </g>

  <g class="font" transform="translate(70 755)">
    <text x="0" y="0" class="ink" font-size="34" font-weight="900">Öne çıkan özellikler</text>

    <g transform="translate(0 42)">
      <rect x="0" y="0" width="292" height="126" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="42" cy="44" r="18" fill="#dbeafe"/>
      <path d="M32 44h20M42 34v20" stroke="#2563eb" stroke-width="5" stroke-linecap="round"/>
      <text x="76" y="42" class="feature-title ink">Ekran / AirPlay</text>
      <text x="24" y="83" class="feature-copy muted">Tablet veya bilgisayar ekranını</text>
      <text x="24" y="109" class="feature-copy muted">öğrencilere yansıt.</text>
    </g>

    <g transform="translate(324 42)">
      <rect x="0" y="0" width="292" height="126" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="42" cy="44" r="18" fill="#dcfce7"/>
      <path d="M32 53l20-20M47 33l12 12" stroke="#16a34a" stroke-width="5" stroke-linecap="round"/>
      <text x="76" y="42" class="feature-title ink">Akıllı tahta</text>
      <text x="24" y="83" class="feature-copy muted">Kalem, silgi, lazer pointer</text>
      <text x="24" y="109" class="feature-copy muted">ve otomatik şekiller.</text>
    </g>

    <g transform="translate(648 42)">
      <rect x="0" y="0" width="292" height="126" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="42" cy="44" r="18" fill="#fee2e2"/>
      <path d="M34 34h16l8 8v18H34zM50 34v10h8" fill="none" stroke="#dc2626" stroke-width="4" stroke-linejoin="round"/>
      <text x="76" y="42" class="feature-title ink">PDF materyal</text>
      <text x="24" y="83" class="feature-copy muted">Kitap, test ve görselleri</text>
      <text x="24" y="109" class="feature-copy muted">ders içinde kullan.</text>
    </g>

    <g transform="translate(0 194)">
      <rect x="0" y="0" width="292" height="126" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="42" cy="44" r="18" fill="#fef3c7"/>
      <path d="M34 37h18a8 8 0 0 1 0 16H34zM54 45l9-6v18l-9-6" fill="none" stroke="#d97706" stroke-width="4" stroke-linejoin="round"/>
      <text x="76" y="42" class="feature-title ink">Ders kaydı</text>
      <text x="24" y="83" class="feature-copy muted">Mikrofon, kamera ve ekran</text>
      <text x="24" y="109" class="feature-copy muted">kayda dahil edilir.</text>
    </g>

    <g transform="translate(324 194)">
      <rect x="0" y="0" width="292" height="126" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="42" cy="44" r="18" fill="#ede9fe"/>
      <path d="M34 54v-9a8 8 0 0 1 16 0v9M30 54h24" fill="none" stroke="#7c3aed" stroke-width="4" stroke-linecap="round"/>
      <text x="76" y="42" class="feature-title ink">Oda güvenliği</text>
      <text x="24" y="83" class="feature-copy muted">Şifreli oda, davet linki</text>
      <text x="24" y="109" class="feature-copy muted">ve katılımcı kontrolü.</text>
    </g>

    <g transform="translate(648 194)">
      <rect x="0" y="0" width="292" height="126" rx="24" fill="#ffffff" filter="url(#softShadow)"/>
      <circle cx="42" cy="44" r="18" fill="#cffafe"/>
      <path d="M33 52h20M33 42h28M33 32h16" stroke="#0891b2" stroke-width="4" stroke-linecap="round"/>
      <text x="76" y="42" class="feature-title ink">Etkileşim</text>
      <text x="24" y="83" class="feature-copy muted">El kaldırma, soru paneli</text>
      <text x="24" y="109" class="feature-copy muted">ve izleyici izinleri.</text>
    </g>
  </g>

  <g class="font" transform="translate(70 1160)">
    <rect x="0" y="0" width="940" height="110" rx="28" fill="url(#primary)" filter="url(#softShadow)"/>
    <text x="44" y="47" class="white" font-size="30" font-weight="900">DersFlow: profesyonel online ders deneyimi</text>
    <text x="44" y="82" fill="#dbeafe" font-size="22" font-weight="650">Kur, odayı paylaş, anlat, kaydet ve öğrencilerinle etkileşime geç.</text>
    <rect x="720" y="28" width="166" height="54" rx="17" fill="#ffffff"/>
    <text x="803" y="63" text-anchor="middle" class="blue" font-size="23" font-weight="900">250 TL / ay</text>
  </g>

  <text x="540" y="1312" text-anchor="middle" class="font muted" font-size="18" font-weight="650">DersFlow web adresi ve iletişim bilgileri buraya eklenebilir.</text>
</svg>
