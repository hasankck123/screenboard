<!doctype html>
<html lang="tr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ScreenBoard</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <section class="lobby-screen" id="lobbyScreen">
      <div class="lobby-shell">
        <div class="lobby-brand">
          <img class="brand-logo" src="assets/kocak-logo.jpeg" alt="Kocak Education">
          <div>
            <h1>ScreenBoard</h1>
            <p id="lobbyStatus">Hazir</p>
          </div>
        </div>

        <div class="lobby-card">
          <div class="lobby-tabs" aria-label="Oturum modu">
            <button id="modeCreate" type="button" class="active">Oda Olustur</button>
            <button id="modeJoin" type="button">Odaya Katil</button>
          </div>

          <label for="displayName">Kullanici adi</label>
          <input id="displayName" autocomplete="name" maxlength="32" placeholder="Ad Soyad">

          <div id="createFields" class="lobby-fields">
            <label for="lessonTitle">Ders basligi</label>
            <input id="lessonTitle" maxlength="64" placeholder="Orn. TYT Matematik - Problemler">
          </div>

          <div id="joinFields" class="lobby-fields" hidden>
            <label for="roomCode">Oda kodu</label>
            <input id="roomCode" autocomplete="off" spellcheck="false" maxlength="16" placeholder="ODA KODU">
          </div>

          <label for="roomPassword">Oda sifresi</label>
          <input id="roomPassword" type="password" autocomplete="current-password" minlength="4" placeholder="En az 4 karakter">

          <button id="createRoom" type="button">Oda Olustur</button>
          <button id="joinRoom" type="button" hidden>Odaya Katil</button>
        </div>
      </div>
    </section>

    <main class="app hidden" id="appShell">
      <section class="side">
        <div class="brand">
          <img class="brand-logo" src="assets/kocak-logo.jpeg" alt="Kocak Education">
          <div>
            <h1>ScreenBoard</h1>
            <p id="statusText">Hazir</p>
          </div>
        </div>

        <div class="room-panel session-panel">
          <div class="panel-heading">
            <strong>Oturum</strong>
            <span id="sessionBadge">Hazir</span>
          </div>
          <div class="room-controls">
            <button id="copyInvite" type="button" disabled>Davet Linki</button>
            <button id="closeRoom" type="button" disabled>Odayi Kapat</button>
          </div>
        </div>

        <div class="participants-panel">
          <div class="panel-heading">
            <strong>Katilanlar</strong>
            <span id="participantCount">0 kisi</span>
          </div>
          <div id="participantsList" class="participants-list">
            <span class="empty-participant">Odaya girince burada gorunur.</span>
          </div>
        </div>

        <div class="share-panel">
          <button id="startAirPlay" type="button" disabled>AirPlay</button>
          <button id="startScreen" type="button" disabled>Ekran</button>
          <button id="startCamera" type="button" disabled>Kamera</button>
          <button id="stopShare" type="button" disabled>Durdur</button>
          <button id="toggleSelfCamera" type="button" disabled>On Kamera</button>
          <button id="toggleMicrophone" type="button" disabled>Mikrofon</button>
          <button id="toggleRecording" type="button" disabled>Kayit</button>
        </div>

        <div class="tool-panel">
          <div class="segmented" aria-label="Arac">
            <button id="toolPen" type="button" class="active">Kalem</button>
            <button id="toolEraser" type="button">Silgi</button>
          </div>
          <label for="colorPicker">Renk</label>
          <input id="colorPicker" type="color" value="#f24b3d">
          <label for="sizePicker">Kalinlik <span id="sizeValue">5</span></label>
          <input id="sizePicker" type="range" min="2" max="42" value="5">
          <div class="tool-actions">
            <button id="toggleViewerDraw" type="button" hidden disabled>Izleyici cizimi kapat</button>
            <button id="undoStroke" type="button">Geri Al</button>
            <button id="clearBoard" type="button">Temizle</button>
            <button id="saveBoard" type="button">PNG</button>
          </div>
        </div>
      </section>

      <section class="stage-wrap">
        <div class="topbar">
          <div>
            <strong id="roomTitle">Canli Ders</strong>
            <span id="roleTitle">Baglanmadi</span>
          </div>
          <div class="signal">
            <span id="recordingBadge" hidden>Kayit aliniyor</span>
            <span id="peerCount">0 baglanti</span>
            <span id="mirrorState">Yayin yok</span>
          </div>
        </div>

        <div class="stage" id="stage">
          <video id="remoteVideo" autoplay playsinline></video>
          <video id="selfCamera" autoplay muted playsinline></video>
          <div id="emptyState">
            <h2>Beyaz tahta</h2>
            <p>AirServer penceresi ve cizimler burada gorunur.</p>
          </div>
          <canvas id="board"></canvas>
        </div>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
